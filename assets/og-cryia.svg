<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07090F"/>
      <stop offset="100%" stop-color="#0C0E1A"/>
    </linearGradient>
    <radialGradient id="orb1" cx="15%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(99,102,241,0.35)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gp)"/>

  <!-- ── SAFE ZONE: x=80 to x=1120, y=40 to y=590 ── -->

  <!-- Eyebrow -->
  <rect x="436" y="46" width="328" height="28" rx="14" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.28)" stroke-width="1"/>
  <circle cx="460" cy="60" r="4.5" fill="#22C55E"/>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#22C55E" text-anchor="middle" letter-spacing="2">ECOSSISTEMA ATIVO · DESDE 2024</text>

  <!-- CRYIA big — centered, safe zone -->
  <text x="600" y="168" font-family="Arial Black, Arial, sans-serif" font-size="86" font-weight="900" fill="url(#gp)" text-anchor="middle" letter-spacing="-3">CRYIA</text>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="12">H U B</text>

  <!-- Divider -->
  <rect x="300" y="218" width="600" height="1" fill="url(#gd)"/>

  <!-- Headline -->
  <text x="600" y="272" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.5">Negócios reais.</text>
  <text x="600" y="316" font-family="Arial, sans-serif" font-size="36" font-weight="800" fill="url(#gh)" text-anchor="middle" letter-spacing="-0.5">Estratégia com IA.</text>

  <!-- Description -->
  <text x="600" y="358" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Conectamos seu negócio à inteligência artificial</text>
  <text x="600" y="378" font-family="Arial, sans-serif" font-size="15.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">de forma humana, estratégica e com resultado real.</text>

  <!-- ── CHIPS — 3 on top row, 3 on bottom row ── -->
  <!-- Row 1: center of 3 chips (w=96+88+108 + 2×10 gaps = 312px), start at 600-156=444 -->
  <rect x="282" y="403" width="96" height="24" rx="12" fill="rgba(99,102,241,0.14)" stroke="rgba(99,102,241,0.38)" stroke-width="1"/>
  <text x="330" y="419" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#818CF8" text-anchor="middle" letter-spacing="0.8">MARKETING</text>

  <rect x="388" y="403" width="80" height="24" rx="12" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.32)" stroke-width="1"/>
  <text x="428" y="419" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#34D399" text-anchor="middle" letter-spacing="0.8">TURISMO</text>

  <rect x="478" y="403" width="106" height="24" rx="12" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.32)" stroke-width="1"/>
  <text x="531" y="419" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#22D3EE" text-anchor="middle" letter-spacing="0.8">TECNOLOGIA</text>

  <rect x="594" y="403" width="82" height="24" rx="12" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.28)" stroke-width="1"/>
  <text x="635" y="419" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FB923C" text-anchor="middle" letter-spacing="0.8">LEARNING</text>

  <rect x="686" y="403" width="88" height="24" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="730" y="419" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#FCD34D" text-anchor="middle" letter-spacing="0.8">MENTORIAS</text>

  <rect x="784" y="403" width="134" height="24" rx="12" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.28)" stroke-width="1"/>
  <text x="851" y="419" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#C084FC" text-anchor="middle" letter-spacing="0.8">EMPREENDEDORISMO</text>

  <!-- ── STAT BOXES — 3 centered: total width = 3×190 + 2×16 = 602px, start at 600-301=299 ── -->
  <rect x="299" y="447" width="188" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="393" y="483" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#818CF8" text-anchor="middle">5</text>
  <text x="393" y="505" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="1">PROJETOS INCUBADOS</text>

  <rect x="503" y="447" width="194" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(34,197,94,0.22)" stroke-width="1"/>
  <text x="600" y="481" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900" fill="#22C55E" text-anchor="middle">IA ATIVA</text>
  <text x="600" y="503" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="1">EM PRODUÇÃO AGORA</text>

  <rect x="713" y="447" width="188" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="807" y="481" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#C084FC" text-anchor="middle">Blumenau</text>
  <text x="807" y="503" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.32)" text-anchor="middle" letter-spacing="1">SC · BRASIL · 2024</text>

  <!-- Domain footer -->
  <text x="600" y="563" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="3">CRYIA.COM.BR</text>

  <!-- Corner accents -->
  <circle cx="80" cy="56" r="1.5" fill="rgba(99,102,241,0.35)"/>
  <circle cx="1120" cy="56" r="1.5" fill="rgba(168,85,247,0.35)"/>
  <circle cx="80" cy="574" r="1.5" fill="rgba(34,197,94,0.35)"/>
  <circle cx="1120" cy="574" r="1.5" fill="rgba(6,182,212,0.35)"/>
</svg>
