<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07090F"/>
      <stop offset="100%" stop-color="#0C0E1A"/>
    </linearGradient>
    <radialGradient id="orb-left" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-right" cx="100%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-center" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="grad-headline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="grad-top-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366F1"/>
      <stop offset="70%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="grad-divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <rect width="1200" height="630" fill="url(#orb-left)"/>
  <rect width="1200" height="630" fill="url(#orb-right)"/>
  <rect width="1200" height="630" fill="url(#orb-center)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#grad-purple)"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- ═══ EYEBROW BADGE — centered ═══ -->
  <rect x="430" y="54" width="340" height="32" rx="16" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <circle cx="460" cy="70" r="5" fill="#22C55E" filter="url(#glow)"/>
  <text x="600" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle" letter-spacing="2.5">ECOSSISTEMA ATIVO · 2024</text>

  <!-- ═══ CRYIA — big centered logo text ═══ -->
  <text x="600" y="178" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="url(#grad-purple)" text-anchor="middle" letter-spacing="-4">CRYIA</text>

  <!-- HUB label -->
  <text x="600" y="216" font-family="Arial, sans-serif" font-size="18" font-weight="300" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="14">HUB</text>

  <!-- Divider -->
  <rect x="300" y="234" width="600" height="1" fill="url(#grad-divider)"/>

  <!-- ═══ HEADLINE — centered ═══ -->
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.5">Negócios reais.</text>
  <text x="600" y="338" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="url(#grad-headline)" text-anchor="middle" letter-spacing="-0.5">Estratégia com IA.</text>

  <!-- ═══ DESCRIPTION — centered ═══ -->
  <text x="600" y="384" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.48)" text-anchor="middle" letter-spacing="0">Conectamos seu negócio à inteligência artificial de forma</text>
  <text x="600" y="407" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.48)" text-anchor="middle" letter-spacing="0">humana, estratégica e com resultado real.</text>

  <!-- ═══ PILARES CHIPS — centered row ═══ -->
  <!-- Marketing -->
  <rect x="208" y="434" width="106" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="261" y="451" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#818CF8" text-anchor="middle" letter-spacing="0.8">MARKETING</text>
  <!-- Turismo -->
  <rect x="324" y="434" width="88" height="26" rx="13" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <text x="368" y="451" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#34D399" text-anchor="middle" letter-spacing="0.8">TURISMO</text>
  <!-- Tecnologia -->
  <rect x="422" y="434" width="108" height="26" rx="13" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="476" y="451" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#22D3EE" text-anchor="middle" letter-spacing="0.8">TECNOLOGIA</text>
  <!-- Learning -->
  <rect x="540" y="434" width="88" height="26" rx="13" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="584" y="451" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#FB923C" text-anchor="middle" letter-spacing="0.8">LEARNING</text>
  <!-- Mentorias -->
  <rect x="638" y="434" width="96" height="26" rx="13" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.28)" stroke-width="1"/>
  <text x="686" y="451" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#FCD34D" text-anchor="middle" letter-spacing="0.8">MENTORIAS</text>
  <!-- Empreend. -->
  <rect x="744" y="434" width="148" height="26" rx="13" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="818" y="451" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#C084FC" text-anchor="middle" letter-spacing="0.8">EMPREENDEDORISMO</text>

  <!-- ═══ BOTTOM STATS — 3 centered boxes ═══ -->
  <!-- Box 1: Projetos -->
  <rect x="270" y="484" width="190" height="76" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="365" y="522" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#818CF8" text-anchor="middle">5</text>
  <text x="365" y="546" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">PROJETOS INCUBADOS</text>

  <!-- Box 2: IA -->
  <rect x="505" y="484" width="190" height="76" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="600" y="522" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#22C55E" text-anchor="middle" filter="url(#glow)">IA</text>
  <text x="600" y="546" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="1">EM PRODUÇÃO AGORA</text>

  <!-- Box 3: Location -->
  <rect x="740" y="484" width="190" height="76" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="835" y="516" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#C084FC" text-anchor="middle">SC</text>
  <text x="835" y="536" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" text-anchor="middle">Blumenau · Brasil</text>
  <text x="835" y="551" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="0.5">DESDE 2024</text>

  <!-- ═══ FOOTER domain ═══ -->
  <text x="600" y="606" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.22)" text-anchor="middle" letter-spacing="3">CRYIA.COM.BR</text>

  <!-- Decorative corner dots -->
  <circle cx="60" cy="60" r="2" fill="rgba(99,102,241,0.3)"/>
  <circle cx="1140" cy="60" r="2" fill="rgba(168,85,247,0.3)"/>
  <circle cx="60" cy="570" r="2" fill="rgba(34,197,94,0.3)"/>
  <circle cx="1140" cy="570" r="2" fill="rgba(6,182,212,0.3)"/>

</svg>
