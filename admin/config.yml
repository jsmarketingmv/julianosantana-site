backend:
  name: github
  repo: jsmarketingmv/julianosantana-site
  branch: main
  base_url: https://www.julianosantana.com.br
  auth_endpoint: api/auth

locale: pt

media_folder: "assets/blog"
public_folder: "/assets/blog"

collections:
  - name: "posts"
    label: "Posts do Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Categoria", name: "category", widget: "string" }
      - { label: "Resumo", name: "summary", widget: "text" }
      - { label: "Imagem de Capa", name: "image", widget: "image", required: false, hint: "Opcional. Recomendado: 1200×630px" }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
