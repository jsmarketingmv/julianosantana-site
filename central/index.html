<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central — Juliano Sant'Ana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde-escuro: #1C3A2A; --verde-medio: #2D5A3D; --verde-sage: #4A7C59;
      --areia: #C49A6C; --terra: #8B5E3C; --creme: #F5F0E8;
      --branco: #FFFFFF; --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(160deg, #0F1E16 0%, #1C3A2A 55%, #122318 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; top: -30%; left: -20%;
      width: 80vmax; height: 80vmax; border-radius: 50%;
      background: radial-gradient(circle, rgba(74,124,89,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-card {
      width: 100%; max-width: 420px; position: relative; z-index: 1;
    }

    .login-logo {
      text-align: center; margin-bottom: 2.5rem;
    }
    .login-logo-nome {
      font-size: 1.8rem; font-weight: 800; color: var(--creme);
      letter-spacing: -0.02em; line-height: 1;
    }
    .login-logo-nome span { color: var(--areia); font-weight: 300; }
    .login-logo-tag {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.25em;
      text-transform: uppercase; color: rgba(245,240,232,0.3);
      margin-top: 0.5rem; display: block;
    }
    .login-logo-badge {
      display: inline-block; margin-top: 1rem;
      background: rgba(196,154,108,0.15); border: 1px solid rgba(196,154,108,0.3);
      color: var(--areia); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.35rem 1rem; border-radius: 20px;
    }

    .login-box {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius); padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-titulo {
      font-size: 1.1rem; font-weight: 700; color: var(--creme);
      margin-bottom: 0.3rem;
    }
    .login-sub {
      font-size: 0.8rem; color: rgba(245,240,232,0.4); margin-bottom: 2rem;
    }

    .form-grupo { margin-bottom: 1.2rem; }
    .form-grupo label {
      display: block; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(245,240,232,0.4); margin-bottom: 0.5rem;
    }
    .form-grupo input {
      width: 100%; padding: 0.85rem 1.1rem;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: var(--creme);
      font-family: 'Montserrat', sans-serif; font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .form-grupo input::placeholder { color: rgba(245,240,232,0.25); }
    .form-grupo input:focus { border-color: rgba(196,154,108,0.5); background: rgba(255,255,255,0.09); }

    .btn-login {
      width: 100%; padding: 0.95rem;
      background: linear-gradient(135deg, var(--verde-medio), var(--verde-sage));
      border: none; border-radius: 10px; color: var(--branco);
      font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,90,61,0.4); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .erro {
      display: none; margin-top: 1rem; padding: 0.8rem 1rem;
      background: rgba(139,94,60,0.15); border: 1px solid rgba(139,94,60,0.3);
      border-radius: 8px; font-size: 0.82rem; color: var(--areia); text-align: center;
    }
    .erro.visivel { display: block; }

    .login-rodape {
      text-align: center; margin-top: 2rem;
      font-size: 0.72rem; color: rgba(245,240,232,0.2);
    }
    .login-rodape a { color: rgba(196,154,108,0.4); text-decoration: none; }
    .login-rodape a:hover { color: var(--areia); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-nome">Juliano <span>Sant'Ana</span></div>
      <span class="login-logo-tag">Área Restrita</span>
      <span class="login-logo-badge">⚡ Central de Comando</span>
    </div>

    <div class="login-box">
      <h1 class="login-titulo">Bem-vindo de volta</h1>
      <p class="login-sub">Acesso exclusivo — plano, copys e métricas</p>

      <form id="form-login">
        <div class="form-grupo">
          <label>Usuário</label>
          <input type="text" id="campo-user" placeholder="seu usuário" autocomplete="username" required />
        </div>
        <div class="form-grupo">
          <label>Senha</label>
          <input type="password" id="campo-senha" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="btn-entrar">Entrar na Central</button>
        <div class="erro" id="msg-erro">Usuário ou senha incorretos.</div>
      </form>
      <div style="text-align:center;margin-top:0.9rem;">
        <a href="https://wa.me/5547984079480?text=Preciso+redefinir+minha+senha+da+Central+de+Comando" target="_blank" id="link-esqueceu" style="font-size:0.72rem;color:rgba(196,154,108,0.45);text-decoration:none;font-family:'Montserrat',sans-serif;letter-spacing:0.03em;transition:color 0.2s;" onmouseover="this.style.color='var(--areia)'" onmouseout="this.style.color='rgba(196,154,108,0.45)'">Esqueceu a senha?</a>
      </div>
    </div>

    <p class="login-rodape">
      <a href="/">← Voltar ao site</a> &nbsp;·&nbsp; julianosantana.com.br
    </p>

  </div>

  <script>
    // Se já tem token válido, vai direto pro dashboard
    (async function () {
      const token = localStorage.getItem('central_token');
      if (!token) return;
      try {
        const res = await fetch('/api/central/auth', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) window.location.href = '/central/dashboard/';
      } catch {}
    })();

    document.getElementById('form-login').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btn-entrar');
      const erro = document.getElementById('msg-erro');
      const user = document.getElementById('campo-user').value.trim();
      const password = document.getElementById('campo-senha').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Verificando...';
      erro.classList.remove('visivel');

      try {
        const res = await fetch('/api/central/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, password })
        });
        const data = await res.json();

        if (data.ok && data.token) {
          localStorage.setItem('central_token', data.token);
          localStorage.setItem('central_user', user);
          window.location.href = '/central/dashboard/';
        } else {
          erro.textContent = data.error || 'Usuário ou senha incorretos.';
          erro.classList.add('visivel');
          btn.disabled = false;
          btn.textContent = 'Entrar na Central';
        }
      } catch {
        erro.textContent = 'Erro de conexão. Tente novamente.';
        erro.classList.add('visivel');
        btn.disabled = false;
        btn.textContent = 'Entrar na Central';
      }
    });
  </script>
</body>
</html>
