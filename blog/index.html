<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Juliano Sant'Ana</title>
  <meta name="description" content="Estratégia, mentalidade e mercado. Reflexões de 25 anos em campo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde-escuro: #1C3A2A;
      --verde-medio: #2D5A3D;
      --verde-sage: #4A7C59;
      --verde-claro: #7FB069;
      --areia: #C49A6C;
      --terra: #8B5E3C;
      --creme: #F5F0E8;
      --creme-escuro: #EDE7D9;
      --texto-escuro: #1A2A1F;
      --texto-medio: #3D5C47;
      --branco: #FFFFFF;
      --radius: 16px;
      --sombra-suave: 0 4px 24px rgba(28,58,42,0.10);
      --sombra-media: 0 8px 40px rgba(28,58,42,0.18);
      --transicao: 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Montserrat', sans-serif; background: var(--creme); color: var(--texto-escuro); line-height: 1.7; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* Navbar */
    .navbar { background: rgba(28,58,42,0.97); backdrop-filter: blur(12px); padding: 1rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
    .navbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1.2rem,4vw,3rem); display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.3rem; font-weight: 800; color: var(--creme); letter-spacing: -0.01em; }
    .logo span { font-weight: 300; color: var(--areia); }
    .nav-back { font-size: 0.85rem; font-weight: 500; color: rgba(245,240,232,0.7); letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; transition: color var(--transicao); }
    .nav-back:hover { color: var(--areia); }
    .nav-back svg { transform: rotate(180deg); }

    /* Hero */
    .blog-hero { background: linear-gradient(160deg, var(--verde-escuro) 0%, #243D2F 100%); padding: clamp(4rem,8vw,7rem) 0 clamp(3rem,6vw,5rem); }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 clamp(1.2rem,4vw,3rem); }
    .blog-hero .tag { display: inline-block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--areia); margin-bottom: 1rem; }
    .blog-hero h1 { font-size: clamp(2rem,5vw,3.5rem); font-weight: 800; color: var(--creme); letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 1rem; }
    .blog-hero h1 em { font-weight: 300; font-style: italic; color: var(--areia); }
    .blog-hero p { color: rgba(245,240,232,0.6); font-size: clamp(0.95rem,1.5vw,1.05rem); max-width: 520px; }

    /* Filtros */
    .filtros { padding: 2.5rem 0 0; }
    .filtros-lista { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .filtro-btn { padding: 0.45rem 1.1rem; border-radius: 50px; border: 1px solid rgba(28,58,42,0.2); font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--texto-medio); transition: all var(--transicao); }
    .filtro-btn:hover, .filtro-btn.ativo { background: var(--verde-escuro); color: var(--creme); border-color: var(--verde-escuro); }

    /* Grid */
    .posts-secao { padding: clamp(3rem,6vw,5rem) 0; }
    .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    @media (max-width: 1024px) { .posts-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px) { .posts-grid { grid-template-columns: 1fr; } }

    /* Card */
    .post-card { background: var(--branco); border-radius: var(--radius); overflow: hidden; box-shadow: var(--sombra-suave); transition: all var(--transicao); display: flex; flex-direction: column; cursor: pointer; }
    .post-card:hover { transform: translateY(-5px); box-shadow: var(--sombra-media); }
    .post-thumb { height: 190px; background: linear-gradient(135deg, var(--verde-sage), var(--verde-medio)); position: relative; }
    .post-categoria { position: absolute; top: 1rem; left: 1rem; background: var(--areia); color: var(--verde-escuro); font-size: 0.68rem; font-weight: 700; padding: 0.3rem 0.8rem; border-radius: 20px; letter-spacing: 0.1em; text-transform: uppercase; }
    .post-body { padding: 1.6rem; flex: 1; display: flex; flex-direction: column; }
    .post-data { font-size: 0.78rem; color: var(--areia); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem; }
    .post-titulo { font-size: 1.1rem; font-weight: 700; color: var(--texto-escuro); margin-bottom: 0.7rem; line-height: 1.35; letter-spacing: -0.01em; }
    .post-resumo { font-size: 0.88rem; color: var(--texto-medio); line-height: 1.7; flex: 1; margin-bottom: 1.4rem; }
    .post-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; font-weight: 600; color: var(--verde-sage); margin-top: auto; transition: gap var(--transicao); }
    .post-link:hover { gap: 0.8rem; color: var(--verde-medio); }

    /* Loading */
    .loading { text-align: center; padding: 4rem 2rem; color: var(--texto-medio); }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(28,58,42,0.1); border-top-color: var(--verde-sage); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .erro { text-align: center; padding: 4rem 2rem; color: var(--texto-medio); }
    .sem-posts { text-align: center; padding: 4rem 2rem; color: var(--texto-medio); font-style: italic; }

    /* Footer mini */
    .footer-mini { background: #0F1E16; padding: 2rem 0; text-align: center; }
    .footer-mini p { font-size: 0.82rem; color: rgba(245,240,232,0.25); }
    .footer-mini a { color: rgba(196,154,108,0.6); transition: color var(--transicao); }
    .footer-mini a:hover { color: var(--areia); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="logo">Juliano <span>Sant'Ana</span></a>
      <a href="/" class="nav-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Voltar ao site
      </a>
    </div>
  </nav>

  <section class="blog-hero">
    <div class="container">
      <span class="tag">Campo, estratégia &amp; verdade</span>
      <h1>Reflexões de quem<br><em>vive o que ensina</em></h1>
      <p>25 anos em campo geram perspectivas que não cabem em template. Aqui compartilho o que aprendo — em negócios, em trilhas e na vida.</p>
    </div>
  </section>

  <section class="filtros">
    <div class="container">
      <div class="filtros-lista" id="filtros">
        <button class="filtro-btn ativo" data-cat="todos">Todos</button>
      </div>
    </div>
  </section>

  <section class="posts-secao">
    <div class="container">
      <div id="posts-container">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Carregando posts...</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer-mini">
    <div class="container">
      <p>&copy; 2025 Juliano Sant'Ana — <a href="/">julianosantana.com.br</a></p>
    </div>
  </footer>

  <script>
  (function () {
    const REPO = 'jsmarketingmv/julianosantana-site';
    const DIR  = 'content/blog';
    let todosOsPosts = [];

    function parseFrontmatter(raw) {
      const match = raw.match(/^---\n([\s\S]*?)\n---/);
      if (!match) return { body: raw };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        const val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
        meta[key] = val;
      });
      meta.body = raw.slice(match[0].length).trim();
      return meta;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' })
               .replace(/^\w/, c => c.toUpperCase());
    }

    function thumbGradient(category) {
      const map = {
        'Estratégia': 'linear-gradient(135deg,#4A7C59,#2D5A3D)',
        'Mercado':    'linear-gradient(135deg,#2D5A3D,#1C3A2A)',
        'Mentalidade':'linear-gradient(135deg,#8B5E3C,#C49A6C)',
      };
      return map[category] || 'linear-gradient(135deg,#4A7C59,#1C3A2A)';
    }

    function renderCard(post) {
      const card = document.createElement('article');
      card.className = 'post-card';
      const thumbStyle = post.image
        ? `background:${thumbGradient(post.category)};background-image:url('${post.image}');background-size:cover;background-position:center`
        : `background:${thumbGradient(post.category)}`;
      card.innerHTML = `
        <div class="post-thumb" style="${thumbStyle}">
          <span class="post-categoria">${post.category || 'Blog'}</span>
        </div>
        <div class="post-body">
          <div class="post-data">${formatDate(post.date)}</div>
          <h2 class="post-titulo">${post.title || 'Sem título'}</h2>
          <p class="post-resumo">${post.summary || ''}</p>
          <a class="post-link" href="/blog/post.html?slug=${encodeURIComponent(post.slug)}">
            Ler artigo
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      `;
      return card;
    }

    function renderPosts(posts) {
      const container = document.getElementById('posts-container');
      if (!posts.length) {
        container.innerHTML = '<p class="sem-posts">Nenhum post encontrado.</p>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'posts-grid';
      posts.forEach(p => grid.appendChild(renderCard(p)));
      container.innerHTML = '';
      container.appendChild(grid);
    }

    function buildFilters(posts) {
      const cats = [...new Set(posts.map(p => p.category).filter(Boolean))];
      const filtros = document.getElementById('filtros');
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filtro-btn';
        btn.textContent = cat;
        btn.dataset.cat = cat;
        filtros.appendChild(btn);
      });
      filtros.addEventListener('click', e => {
        if (!e.target.classList.contains('filtro-btn')) return;
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
        e.target.classList.add('ativo');
        const cat = e.target.dataset.cat;
        const filtrados = cat === 'todos' ? todosOsPosts : todosOsPosts.filter(p => p.category === cat);
        renderPosts(filtrados);
      });
    }

    async function init() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${DIR}`);
        if (!res.ok) throw new Error('GitHub API error ' + res.status);
        const files = await res.json();
        const mdFiles = files.filter(f => f.name.endsWith('.md'));

        const posts = await Promise.all(mdFiles.map(async f => {
          // Tenta carregar do mesmo domínio primeiro (mais rápido), fallback para GitHub raw
          const localUrl = `/content/blog/${f.name}`;
          const raw = await fetch(localUrl).then(r => r.ok ? r.text() : fetch(f.download_url).then(r2 => r2.text()));
          const meta = parseFrontmatter(raw);
          return { ...meta, slug: f.name.replace('.md', '') };
        }));

        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        todosOsPosts = posts;

        buildFilters(posts);
        renderPosts(posts);
      } catch (err) {
        document.getElementById('posts-container').innerHTML =
          '<p class="erro">Não foi possível carregar os posts. Tente novamente em instantes.</p>';
        console.error(err);
      }
    }

    init();
  })();
  </script>

</body>
</html>
